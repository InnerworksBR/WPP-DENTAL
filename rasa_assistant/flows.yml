flows:
  general_help:
    description: >
      Trigger when the user greets the clinic, says hello, or asks broadly what the assistant can do.
      Use this to welcome the user and explain the operational help available.
    steps:
      - action: action_load_clinic_context
      - action: utter_general_help
        next: END

  provide_address:
    description: >
      Trigger when the user asks for the clinic address, where the office is located, or how to get there.
    steps:
      - action: action_load_clinic_context
      - action: utter_clinic_address
        next: END

  check_plan_coverage:
    description: >
      Trigger when the user asks if the clinic accepts a dental plan or convenio,
      for example "voces atendem unimed", "aceita odontoprev" or "quais convenios atendem".
      This flow is only for informational plan questions and should not start appointment management.
    steps:
      - action: action_load_clinic_context
      - action: action_check_plan_info
        next:
          - if: slots.plan_found and slots.plan_is_referral
            then:
              - action: utter_plan_referral_info
                next: END
          - if: slots.plan_found
            then:
              - action: utter_plan_supported
                next: END
          - else:
              - action: utter_list_accepted_plans
                next: END

  answer_procedure_policy:
    description: >
      Trigger when the user asks operational questions about prosthesis, orthodontics,
      root canal in molar, or wisdom tooth extraction, including whether a plan is accepted.
    steps:
      - action: action_check_procedure_policy
        next:
          - if: slots.procedure_status = "not_performed"
            then:
              - action: utter_procedure_not_performed
                next: END
          - if: slots.procedure_status = "only_particular"
            then:
              - action: utter_procedure_only_particular
                next: END
          - if: slots.procedure_status = "allowed_with_card_photo"
            then:
              - action: utter_procedure_card_photo_required
                next: END
          - if: slots.procedure_status = "allowed_plans_with_card_photo"
            then:
              - action: utter_procedure_allowed_plans_with_card_photo
                next: END
          - if: slots.procedure_status = "plan_not_allowed"
            then:
              - action: utter_procedure_not_allowed_for_plan
                next: END
          - if: slots.procedure_status = "allowed_plans_only"
            then:
              - action: utter_procedure_allowed_plans_only
                next: END
          - else:
              - action: action_handle_legacy_turn
                next: END

  send_tarcilia_referral:
    description: >
      Trigger when the user wants to proceed with a referral plan handled by Dra. Tarcilia,
      for example "quero encaminhar pela caixa de peculio" or "quero marcar pela caixa de saude".
      This flow should collect only the patient's name and the consultation reason before sending the referral.
    steps:
      - action: action_load_clinic_context
      - action: action_check_plan_info
        next:
          - if: not slots.plan_found or not slots.plan_is_referral
            then:
              - action: action_handle_legacy_turn
                next: END
      - collect: patient_name
      - collect: consultation_reason
      - action: action_send_tarcilia_referral
      - action: utter_referral_sent
        next: END

  manage_appointment_operations:
    description: >
      Trigger when the user wants to schedule, reschedule, cancel, confirm, or check an appointment,
      asks about dates, times, availability, or continues a scheduling conversation.
      Use the legacy clinic workflow for these operational turns while the full CALM migration is in progress.
    steps:
      - action: action_handle_legacy_turn
        next: END

  polite_close:
    description: >
      Trigger when the user only says thank you, ok, valeu, perfeito, entendido, or politely closes the conversation.
    steps:
      - action: utter_polite_close
        next: END
