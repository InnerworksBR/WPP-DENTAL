# Configurações gerais do sistema
doctor:
  name: "Dra. Priscila"
  phone: "${DOCTOR_PHONE}"
  calendar_id: "${GOOGLE_CALENDAR_ID}"
  address: "Av. Exemplo, 123 - Centro, São Vicente - SP"

# Períodos do dia para sugestão de horários
periods:
  manhã:
    start: "07:00"
    end: "12:00"
  tarde:
    start: "12:00"
    end: "18:00"
  noite:
    start: "18:00"
    end: "21:00"

# Configurações de agendamento
scheduling:
  slot_duration_minutes: 15
  suggestions_count: 2
  min_business_days_ahead: 2
  max_days_ahead: 30

# OpenAI
openai:
  model: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 500
